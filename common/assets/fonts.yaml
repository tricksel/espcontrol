# =============================================================================
# FONTS - Roboto variants for main UI and setup screens
# =============================================================================

font:
  # Main page: large statistics / sensor values
  - file: "gfonts://Roboto@Light"
    id: statistics_font
    size: 48
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"

  # Volume/climate modal: large numeric value
  - file: "gfonts://Roboto@Thin"
    id: volume_modal_number_font
    size: 96
    bpp: 4
    glyphs: !include text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include hebrew_glyphs.yaml

  # Main page: media now-playing titles (sensor value size, full text glyph coverage)
  - file: "gfonts://Roboto@Light"
    id: media_title_font
    size: 43
    bpp: 4
    glyphs: !include text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include hebrew_glyphs.yaml

  # Main page: button labels
  - file: "gfonts://Roboto"
    id: label_font
    size: 22
    bpp: 4
    glyphs: !include text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include hebrew_glyphs.yaml

  # Top bar: clock and temperature
  - file: "gfonts://Roboto"
    id: clockbar_font
    size: 20
    bpp: 4
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include hebrew_glyphs.yaml

  # Setup screens: titles (40px light)
  - file: "gfonts://Roboto@Light"
    id: setup_title_font
    size: 40
    bpp: 4
    glyphs: !include setup_text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include hebrew_glyphs.yaml

  # Setup screens: body text (24px)
  - file: "gfonts://Roboto"
    id: setup_body_font
    size: 24
    bpp: 4
    glyphs: !include setup_text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include hebrew_glyphs.yaml
