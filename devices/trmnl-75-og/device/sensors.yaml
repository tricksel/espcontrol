# =============================================================================
# SENSORS - TRMNL e-paper dashboard config and refresh wiring
# =============================================================================

globals:
  - id: indoor_temp
    type: float
    initial_value: 'NAN'
  - id: outdoor_temp
    type: float
    initial_value: 'NAN'
  - id: display_asleep
    type: bool
    initial_value: 'false'
  - id: screen_schedule_asleep
    type: bool
    initial_value: 'false'
  - id: screensaver_display_off_active
    type: bool
    initial_value: 'false'
  - id: screensaver_dimmed_active
    type: bool
    initial_value: 'false'
  - id: home_screen_idle_suspended
    type: bool
    initial_value: 'false'
  - id: presence_detected
    type: bool
    initial_value: 'false'
  - id: media_player_playing
    type: bool
    initial_value: 'false'
  - id: screen_rotation_ready
    type: bool
    initial_value: 'true'
  - id: trmnl_display_refresh_enabled
    type: bool
    initial_value: 'false'
  - id: trmnl_force_full_refresh
    type: bool
    initial_value: 'false'

select:
  - platform: template
    name: "${entity_screen_temperature_unit}"
    internal: true
    disabled_by_default: true
    id: temperature_unit_select
    entity_category: config
    icon: "mdi:temperature-celsius"
    optimistic: true
    restore_value: true
    initial_option: "Auto"
    options:
      - "Auto"
      - "°C"
      - "°F"
    web_server:
      sorting_group_id: sg_display
    on_value:
      then:
        - lambda: |-
            set_display_temperature_unit(id(temperature_unit_select).current_option(),
                                         id(timezone_select).current_option());
            refresh_temperature_unit_labels();
        - script.execute: trmnl_dashboard_content_changed

  - platform: template
    name: "${entity_screen_timezone}"
    internal: true
    disabled_by_default: true
    id: timezone_select
    entity_category: config
    icon: "mdi:map-clock"
    optimistic: true
    restore_value: true
    initial_option: "UTC (GMT+0)"
    options:
      - "UTC (GMT+0)"
      - "Europe/London (GMT+0)"
      - "America/New_York (GMT-5)"
      - "America/Chicago (GMT-6)"
      - "America/Denver (GMT-7)"
      - "America/Los_Angeles (GMT-8)"
    web_server:
      sorting_group_id: sg_display
    on_value:
      then:
        - lambda: |-
            const char *posix = apply_timezone(id(timezone_select).current_option());
            id(panel_time).set_timezone(posix);
            id(homeassistant_time).set_timezone(posix);
            set_display_temperature_unit(id(temperature_unit_select).current_option(),
                                         id(timezone_select).current_option());
        - script.execute: time_update
        - script.execute: trmnl_dashboard_content_changed

  - platform: template
    name: "${entity_screen_clock_format}"
    internal: true
    disabled_by_default: true
    id: clock_format_select
    entity_category: config
    icon: "mdi:clock-outline"
    optimistic: true
    restore_value: true
    initial_option: "24h"
    options:
      - "24h"
      - "12h"
    web_server:
      sorting_group_id: sg_display
    on_value:
      then:
        - script.execute: time_update
        - script.execute: trmnl_dashboard_content_changed

  - platform: template
    name: "Screen: Dithering"
    internal: true
    id: display_dithering_select
    entity_category: config
    icon: "mdi:checkerboard"
    optimistic: true
    restore_value: true
    initial_option: "Off"
    options:
      - "Off"
      - "Ordered"
    web_server:
      sorting_group_id: sg_display
    on_value:
      then:
        - lambda: |-
            id(epaper).set_ordered_dither_enabled(x == "Ordered");
        - script.execute: trmnl_dashboard_content_changed

text:
  - platform: template
    name: "${entity_indoor_temp_entity}"
    internal: true
    id: indoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:home-thermometer"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "${entity_outdoor_temp_entity}"
    internal: true
    id: outdoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:sun-thermometer"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "${entity_presence_sensor_entity}"
    internal: true
    id: presence_sensor_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:motion-sensor"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "${entity_media_player_sleep_prevention_entity}"
    internal: true
    id: media_player_sleep_prevention_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:speaker"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "${entity_screen_month_names}"
    internal: true
    id: calendar_month_names
    optimistic: true
    restore_value: true
    initial_value: "January,February,March,April,May,June,July,August,September,October,November,December"
    min_length: 0
    max_length: 255
    mode: text
    entity_category: config
    icon: "mdi:calendar-text"
    update_interval: never
    web_server:
      sorting_group_id: sg_display
    on_value:
      then:
        - lambda: |-
            set_calendar_month_names(x);
        - script.execute: trmnl_dashboard_content_changed

switch:
  - platform: template
    name: "${entity_screen_clock_bar}"
    internal: true
    id: clock_bar_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    icon: "mdi:clock-digital"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: trmnl_clock_bar_apply
      - script.execute: trmnl_dashboard_content_changed
    on_turn_off:
      - script.execute: trmnl_clock_bar_apply
      - script.execute: trmnl_dashboard_content_changed

  - platform: template
    name: "${entity_screen_network_status_icon}"
    internal: true
    id: network_status_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    icon: "mdi:wifi"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: network_status_refresh
      - script.execute: trmnl_dashboard_content_changed
    on_turn_off:
      - lambda: 'network_status_hide_modal();'
      - script.execute: trmnl_dashboard_content_changed

  - platform: template
    name: "${entity_indoor_temp_enable}"
    internal: true
    id: indoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:home-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: trmnl_dashboard_content_changed
    on_turn_off:
      - script.execute: trmnl_dashboard_content_changed

  - platform: template
    name: "${entity_outdoor_temp_enable}"
    internal: true
    id: outdoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:sun-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: trmnl_dashboard_content_changed
    on_turn_off:
      - script.execute: trmnl_dashboard_content_changed

  - platform: template
    name: "${entity_screen_temperature_degree_symbol}"
    internal: true
    id: temperature_degree_symbol_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    icon: "mdi:temperature-celsius"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: |-
          set_display_temperature_degree_symbol(true);
      - script.execute: trmnl_dashboard_content_changed
    on_turn_off:
      - lambda: |-
          set_display_temperature_degree_symbol(false);
      - script.execute: trmnl_dashboard_content_changed

time:
  - platform: sntp
    id: panel_time
    timezone: "UTC0"
    on_time_sync:
      - script.execute: time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

  - platform: homeassistant
    id: homeassistant_time
    timezone: "UTC0"
    update_interval: 1min
    on_time_sync:
      - script.execute: time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

text_sensor:
  - platform: template
    name: "Screen: Date"
    id: screen_date_sensor
    entity_category: diagnostic
    icon: "mdi:calendar"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

script:
  - id: refresh_button_grid
    mode: restart
    then:
      - script.execute: trmnl_sync_dashboard_config
      - script.execute: trmnl_dashboard_config_changed

  - id: time_update
    mode: restart
    then:
      - lambda: |-
          const char *posix = apply_timezone(id(timezone_select).current_option());
          id(panel_time).set_timezone(posix);
          id(homeassistant_time).set_timezone(posix);
          set_display_temperature_unit(id(temperature_unit_select).current_option(),
                                       id(timezone_select).current_option());
          set_display_temperature_degree_symbol(id(temperature_degree_symbol_enabled).state);
          set_calendar_month_names(id(calendar_month_names).state);

          auto now = panel_time_or_fallback(id(panel_time).now(),
                                            id(homeassistant_time).now());
          bool use_12h = id(clock_format_select).current_option() == "12h";
          if (now.is_valid()) {
            char time_buf[8];
            int hour = now.hour;
            if (use_12h) {
              hour = hour % 12;
              if (hour == 0) hour = 12;
              snprintf(time_buf, sizeof(time_buf), "%d:%02d", hour, now.minute);
            } else {
              snprintf(time_buf, sizeof(time_buf), "%02d:%02d", hour, now.minute);
            }
            lv_label_set_text(id(display_time), time_buf);

            char date_buf[11];
            snprintf(date_buf, sizeof(date_buf), "%04d-%02d-%02d",
                     now.year, now.month, now.day_of_month);
            id(screen_date_sensor).publish_state(date_buf);
            update_calendar_cards(true, now.day_of_month, now.month);
            update_calendar_cards_time(
              true, now.day_of_month, now.month, now.hour, now.minute, use_12h);
            update_timezone_cards(true, now.timestamp,
                                  id(timezone_select).current_option(), use_12h);
          } else {
            lv_label_set_text(id(display_time), "--:--");
            id(screen_date_sensor).publish_state("");
            update_calendar_cards(false, 0, 0);
            update_calendar_cards_time(false, 0, 0, 0, 0, false);
            update_timezone_cards(false, 0, id(timezone_select).current_option(), use_12h);
          }
          refresh_temp_label_values(id(temperatures), id(main_page)->obj,
                                    true,
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));

  - id: trmnl_sync_dashboard_config
    mode: restart
    then:
      - lambda: |-
          set_dashboard_content_changed_callback([]() {
            id(trmnl_dashboard_content_changed).execute();
          });

          #define BTN_SLOT(n) { button_##n##_config, button_##n, button_##n##_icon_label, button_##n##_text_label, button_##n##_sensor_container, button_##n##_sensor_label, button_##n##_unit_label, button_##n##_subpage_label }
          BtnSlot slots[] = {
            BTN_SLOT(1), BTN_SLOT(2), BTN_SLOT(3), BTN_SLOT(4),
            BTN_SLOT(5), BTN_SLOT(6), BTN_SLOT(7), BTN_SLOT(8),
            BTN_SLOT(9), BTN_SLOT(10), BTN_SLOT(11), BTN_SLOT(12),
          };
          #undef BTN_SLOT

          GridConfig cfg = {};
          cfg.num_slots = 12;
          cfg.cols = 4;
          cfg.subpage_chevrons_enabled = false;
          cfg.wrap_tall_labels = true;
          cfg.label_lines = 2;
          cfg.label_lines_tall = 3;
          cfg.icon_font = id(font_icon_card)->get_lv_font();
          cfg.sp_sensor_font = id(font_number_value)->get_lv_font();
          cfg.sp_large_sensor_font = id(font_number_value)->get_lv_font();
          cfg.large_sensor_unit_offset_percent = -10;
          cfg.media_title_font = id(font_text_media_title)->get_lv_font();
          cfg.option_select_value_font = id(font_number_value)->get_lv_font();
          cfg.volume_number_font = id(font_number_value)->get_lv_font();
          cfg.volume_label_font = id(font_text_body)->get_lv_font();
          cfg.climate_card_icon_font = id(font_icon_card)->get_lv_font();
          cfg.subpage_chevron_font = id(font_text_body)->get_lv_font();
          cfg.climate_option_title_font = id(font_text_body)->get_lv_font();
          cfg.climate_option_value_font = id(font_text_body)->get_lv_font();
          cfg.temperature_unit = id(temperature_unit_select).current_option();
          cfg.timezone = id(timezone_select).current_option();

          grid_phase1(slots, cfg,
            id(button_order).state,
            id(button_on_color).state,
            id(button_off_color).state,
            id(sensor_card_color).state,
            id(main_page)->obj);
          grid_phase2(slots, cfg,
            nullptr, nullptr, nullptr, nullptr, nullptr, nullptr, nullptr, nullptr,
            id(button_order).state,
            id(button_on_color).state,
            id(button_off_color).state,
            id(sensor_card_color).state,
            id(main_page)->obj);

  - id: trmnl_dashboard_config_changed
    mode: restart
    then:
      - delay: 2s
      - script.execute: trmnl_refresh_display_when_ready

  - id: trmnl_dashboard_content_changed
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return lv_scr_act() == id(main_page)->obj;'
          then:
            - delay: 2s
            - script.execute: trmnl_refresh_display_when_ready

  - id: trmnl_clock_bar_apply
    mode: restart
    then:
      - lambda: |-
          bool enabled = id(clock_bar_enabled).state;
          lv_obj_set_style_pad_top(
            id(main_page)->obj,
            enabled ? ${main_page_pad_top} : ${main_page_compact_pad_top},
            LV_PART_MAIN);
          lv_obj_update_layout(id(main_page)->obj);

          if (!enabled) {
            lv_obj_add_flag(id(display_time), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(network_status_button), LV_OBJ_FLAG_HIDDEN);
            network_status_hide_modal();
            return;
          }

          if (lv_scr_act() == id(main_page)->obj) {
            lv_obj_clear_flag(id(display_time), LV_OBJ_FLAG_HIDDEN);
            if (id(network_status_enabled).state) {
              lv_obj_clear_flag(id(network_status_button), LV_OBJ_FLAG_HIDDEN);
              id(network_status_refresh).execute();
            }
          }
          refresh_temp_label_values(id(temperatures), id(main_page)->obj,
                                    true,
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));

  - id: trmnl_refresh_display_when_ready
    mode: restart
    then:
      - if:
          condition:
            lambda: "return id(trmnl_display_refresh_enabled);"
          then:
            - script.execute: trmnl_refresh_display_partial
          else:
            - script.execute: trmnl_start_display_refreshes

  - id: trmnl_start_display_refreshes
    mode: restart
    then:
      - delay: 20s
      - lambda: |-
          id(trmnl_display_refresh_enabled) = true;
      - script.execute: trmnl_refresh_display_full

  - id: trmnl_refresh_display_full
    mode: restart
    then:
      - lambda: |-
          id(trmnl_force_full_refresh) = true;
      - script.execute: trmnl_refresh_display

  - id: trmnl_refresh_display_partial
    mode: restart
    then:
      - lambda: |-
          id(trmnl_force_full_refresh) = false;
      - script.execute: trmnl_refresh_display

  - id: trmnl_refresh_display
    mode: restart
    then:
      - script.execute: time_update
      - lambda: |-
          ESP_LOGI("trmnl", "Refreshing e-paper display");
      - component.update: epaper

  - id: screensaver_wake
    then:
      - script.execute: trmnl_refresh_display_full

  - id: screen_schedule_manual_sleep
    then:
      - lambda: |-
          ESP_LOGI("trmnl", "Manual sleep is ignored on the e-paper target");

  - id: home_screen_idle_check
    then:
      - lambda: |-
          return;

  - id: screensaver_presence_wake
    then:
      - script.execute: trmnl_refresh_display_full

  - id: screensaver_presence_sleep
    then:
      - lambda: |-
          return;

esphome:
  on_boot:
    - priority: -150
      then:
        - script.execute: trmnl_clock_bar_apply
    - priority: -100
      then:
        - script.execute: time_update
        - script.execute: trmnl_sync_dashboard_config
        - script.execute: trmnl_start_display_refreshes

interval:
  - interval: 5s
    then:
      - lambda: |-
          weather_forecast_cancel_stale_requests();
          weather_forecast_send_next_queued();

  - interval: 30min
    then:
      - if:
          condition:
            lambda: "return id(trmnl_display_refresh_enabled);"
          then:
            - script.execute: trmnl_refresh_display_full
