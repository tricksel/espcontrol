# =============================================================================
# SENSORS - TRMNL e-paper dashboard config subscriptions
# =============================================================================

script:
  - id: trmnl_bind_lvgl_widgets
    then:
      - lambda: |-
          lv_label_set_text(id(trmnl_wifi_setup_ssid), wifi::global_wifi_component->get_ap().get_ssid().c_str());
          espcontrol::epaper_dashboard_bind_lvgl_slot(0, id(trmnl_tile_1), id(trmnl_tile_1_icon_label), id(trmnl_tile_1_sensor_container), id(trmnl_tile_1_label), id(trmnl_tile_1_value), id(trmnl_tile_1_unit));
          espcontrol::epaper_dashboard_bind_lvgl_slot(1, id(trmnl_tile_2), id(trmnl_tile_2_icon_label), id(trmnl_tile_2_sensor_container), id(trmnl_tile_2_label), id(trmnl_tile_2_value), id(trmnl_tile_2_unit));
          espcontrol::epaper_dashboard_bind_lvgl_slot(2, id(trmnl_tile_3), id(trmnl_tile_3_icon_label), id(trmnl_tile_3_sensor_container), id(trmnl_tile_3_label), id(trmnl_tile_3_value), id(trmnl_tile_3_unit));
          espcontrol::epaper_dashboard_bind_lvgl_slot(3, id(trmnl_tile_4), id(trmnl_tile_4_icon_label), id(trmnl_tile_4_sensor_container), id(trmnl_tile_4_label), id(trmnl_tile_4_value), id(trmnl_tile_4_unit));
          espcontrol::epaper_dashboard_bind_lvgl_slot(4, id(trmnl_tile_5), id(trmnl_tile_5_icon_label), id(trmnl_tile_5_sensor_container), id(trmnl_tile_5_label), id(trmnl_tile_5_value), id(trmnl_tile_5_unit));
          espcontrol::epaper_dashboard_bind_lvgl_slot(5, id(trmnl_tile_6), id(trmnl_tile_6_icon_label), id(trmnl_tile_6_sensor_container), id(trmnl_tile_6_label), id(trmnl_tile_6_value), id(trmnl_tile_6_unit));
          espcontrol::epaper_dashboard_bind_lvgl_slot(6, id(trmnl_tile_7), id(trmnl_tile_7_icon_label), id(trmnl_tile_7_sensor_container), id(trmnl_tile_7_label), id(trmnl_tile_7_value), id(trmnl_tile_7_unit));
          espcontrol::epaper_dashboard_bind_lvgl_slot(7, id(trmnl_tile_8), id(trmnl_tile_8_icon_label), id(trmnl_tile_8_sensor_container), id(trmnl_tile_8_label), id(trmnl_tile_8_value), id(trmnl_tile_8_unit));
          espcontrol::epaper_dashboard_bind_lvgl_slot(8, id(trmnl_tile_9), id(trmnl_tile_9_icon_label), id(trmnl_tile_9_sensor_container), id(trmnl_tile_9_label), id(trmnl_tile_9_value), id(trmnl_tile_9_unit));
          espcontrol::epaper_dashboard_bind_lvgl_slot(9, id(trmnl_tile_10), id(trmnl_tile_10_icon_label), id(trmnl_tile_10_sensor_container), id(trmnl_tile_10_label), id(trmnl_tile_10_value), id(trmnl_tile_10_unit));
          espcontrol::epaper_dashboard_bind_lvgl_slot(10, id(trmnl_tile_11), id(trmnl_tile_11_icon_label), id(trmnl_tile_11_sensor_container), id(trmnl_tile_11_label), id(trmnl_tile_11_value), id(trmnl_tile_11_unit));
          espcontrol::epaper_dashboard_bind_lvgl_slot(11, id(trmnl_tile_12), id(trmnl_tile_12_icon_label), id(trmnl_tile_12_sensor_container), id(trmnl_tile_12_label), id(trmnl_tile_12_value), id(trmnl_tile_12_unit));

  - id: trmnl_update_clock_bar
    then:
      - lambda: |-
          auto now = id(trmnl_time).now();
          if (now.is_valid()) {
            char time_text[6];
            snprintf(time_text, sizeof(time_text), "%02d:%02d", now.hour, now.minute);
            lv_label_set_text(id(display_time), time_text);
          } else {
            lv_label_set_text(id(display_time), "--:--");
          }
          lv_label_set_text(id(network_status_icon_label), "\U000F0928");

  - id: trmnl_refresh_display
    mode: restart
    then:
      - script.execute: trmnl_update_clock_bar
      - lambda: |-
          espcontrol::epaper_dashboard_update_lvgl_page(id(trmnl_current_page));
      - delay: 250ms
      - component.update: epaper

  - id: trmnl_sync_dashboard_config
    then:
      - script.execute: trmnl_bind_lvgl_widgets
      - lambda: |-
          // BEGIN GENERATED TRMNL DASHBOARD CONFIG
          // Generated from devices/manifest.json plan: 1 page x 12 slots.
          espcontrol::epaper_dashboard_set_config(0, id(button_1_config).state);
          espcontrol::epaper_dashboard_set_config(1, id(button_2_config).state);
          espcontrol::epaper_dashboard_set_config(2, id(button_3_config).state);
          espcontrol::epaper_dashboard_set_config(3, id(button_4_config).state);
          espcontrol::epaper_dashboard_set_config(4, id(button_5_config).state);
          espcontrol::epaper_dashboard_set_config(5, id(button_6_config).state);
          espcontrol::epaper_dashboard_set_config(6, id(button_7_config).state);
          espcontrol::epaper_dashboard_set_config(7, id(button_8_config).state);
          espcontrol::epaper_dashboard_set_config(8, id(button_9_config).state);
          espcontrol::epaper_dashboard_set_config(9, id(button_10_config).state);
          espcontrol::epaper_dashboard_set_config(10, id(button_11_config).state);
          espcontrol::epaper_dashboard_set_config(11, id(button_12_config).state);
          // END GENERATED TRMNL DASHBOARD CONFIG

interval:
  - interval: 5min
    then:
      - script.execute: trmnl_refresh_display

  - interval: 45s
    then:
      - if:
          condition:
            lambda: "return espcontrol::epaper_dashboard_is_dirty();"
          then:
            - script.execute: trmnl_refresh_display
