# =============================================================================
# DEVICE - TRMNL 7.5 OG e-paper hardware definition
# =============================================================================
# Hardware mapping follows the current Seeed TRMNL 7.5" (OG) DIY Kit ESPHome
# cookbook: XIAO ESP32-S3 Plus plus Waveshare 7.5-inch monochrome e-paper.
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/jtenniswood/espcontrol"
  espcontrol_component_ref: "main"

esp32:
  board: seeed_xiao_esp32s3
  flash_size: 16MB
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    refresh: 1s
    components: [espcontrol, trmnl_epaper]

espcontrol:

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      - "-DLV_USE_BIDI=1"
      - "-DESPCONTROL_DISABLE_TODO=1"
      - "-DESPCONTROL_MAX_GRID_SLOTS=12"

logger:

api:
  reboot_timeout: 0s
  homeassistant_states: true
  homeassistant_services: true
  on_client_connected:
    - lambda: |-
        ESP_LOGI("api", "API client connected: %s", client_info.c_str());
        bool is_home_assistant = client_info.find("Home Assistant") != std::string::npos;
        if (is_home_assistant && ha_api_state_connected()) {
          apply_registered_ha_control_availability(true);
          refresh_weather_forecast_cards();
        }
    - delay: 2s
    - script.execute: trmnl_refresh_display_when_ready
    - delay: 8s
    - lambda: |-
        if (ha_api_state_connected()) refresh_weather_forecast_cards();
    - delay: 20s
    - lambda: |-
        if (ha_api_state_connected()) refresh_weather_forecast_cards();
  on_client_disconnected:
    - lambda: |-
        ESP_LOGW("api", "API client disconnected: %s", client_info.c_str());
        bool is_home_assistant = client_info.find("Home Assistant") != std::string::npos;
        if (!is_home_assistant && ha_api_state_connected()) {
          return;
        }
        weather_forecast_cancel_pending_requests();
        cover_stop_cancel_pending_request();
        apply_registered_ha_control_availability(false);

ota:
  - platform: esphome

http_request:
  id: http_req
  timeout: 10s

web_server:
  port: 80
  version: 3
  include_internal: true
  js_url: https://jtenniswood.github.io/espcontrol/webserver/${device_slug}/www.js?v=${firmware_version}&ui=20260602-trmnl-clock-post
  sorting_groups:
    - id: sg_button
      name: "Button Configuration"
      sorting_weight: 10
    - id: sg_display
      name: "Display Configuration"
      sorting_weight: 20
    - id: sg_connectivity
      name: "Connectivity"
      sorting_weight: 35
    - id: sg_firmware
      name: "Firmware"
      sorting_weight: 40
    - id: sg_developer
      name: "Developer"
      sorting_weight: 90

wifi:
  power_save_mode: none
  reboot_timeout: 30min
  use_psram: true
  ap:
    ap_timeout: 90s
  on_connect:
    - script.execute: network_status_refresh
    - script.execute: trmnl_refresh_display_when_ready
  on_disconnect:
    - script.execute: network_status_refresh
    - script.execute: trmnl_refresh_display_when_ready

captive_portal:

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

display:
  - platform: trmnl_epaper
    id: epaper
    cs_pin: GPIO44
    dc_pin: GPIO10
    reset_pin: GPIO38
    busy_pin:
      number: GPIO4
      inverted: true
    update_interval: never

lvgl:
  displays: epaper

button:
  - platform: template
    name: "Apply Configuration"
    internal: true
    disabled_by_default: true
    icon: mdi:restart
    entity_category: config
    on_press:
      then:
        - lambda: |-
            global_preferences->sync();
            App.safe_reboot();

  - platform: template
    name: "Refresh Display"
    icon: mdi:refresh
    entity_category: config
    web_server:
      sorting_group_id: sg_display
      sorting_weight: 5
    on_press:
      then:
        - script.execute: trmnl_refresh_display_full

switch:
  - platform: template
    name: "${entity_developer_experimental_features}"
    internal: true
    id: developer_experimental_features
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:flask-outline"
    web_server:
      sorting_group_id: sg_developer
