time:
  - platform: sntp
    id: trmnl_time

interval:
  - interval: 5s
    then:
      - lambda: |-
          weather_forecast_cancel_stale_requests();
          weather_forecast_send_next_queued();

  - interval: 1h
    then:
      - lambda: |-
          refresh_weather_forecast_cards();

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

globals:
  - id: trmnl_current_page
    type: int
    restore_value: true
    initial_value: "0"
  - id: trmnl_force_full_refresh
    type: bool
    restore_value: false
    initial_value: "false"
  - id: trmnl_display_refresh_enabled
    type: bool
    restore_value: false
    initial_value: "false"

binary_sensor:
  - platform: gpio
    id: trmnl_key_prev
    name: "TRMNL Previous Page"
    internal: true
    pin:
      number: GPIO2
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      then:
        - lambda: |-
            id(trmnl_current_page) = 0;
        - script.execute: trmnl_refresh_display_full

  - platform: gpio
    id: trmnl_key_home
    name: "TRMNL Home Page"
    internal: true
    pin:
      number: GPIO3
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      then:
        - lambda: |-
            id(trmnl_current_page) = 0;
        - script.execute: trmnl_refresh_display_full

  - platform: gpio
    id: trmnl_key_next
    name: "TRMNL Next Page"
    internal: true
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      then:
        - lambda: |-
            id(trmnl_current_page) = 0;
        - script.execute: trmnl_refresh_display_full

display:
  - platform: waveshare_epaper
    id: epaper
    model: 7.50inv2p
    cs_pin: GPIO44
    dc_pin: GPIO10
    reset_pin: GPIO38
    busy_pin:
      number: GPIO4
      inverted: true
    update_interval: never
    auto_clear_enabled: false
    full_update_every: 30
    rotation: 0

lvgl:
  id: main_lvgl
  displays: epaper
  buffer_size: 12%
